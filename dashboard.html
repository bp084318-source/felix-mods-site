<!DOCTYPE html>
<html>
<head>
  <title>Felix Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #020617;
      color: white;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
      background: linear-gradient(90deg,#38bdf8,#a855f7);
      -webkit-background-clip: text;
      color: transparent;
    }

    .search {
      padding: 15px;
    }

    .search input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      background: #000;
      border: none;
      color: white;
    }

    .mods {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(56,189,248,0.2);
    }

    img.thumb {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .title { font-weight: bold; }
    .desc { font-size: 13px; color: #94a3b8; }

    .tag {
      font-size: 11px;
      background: rgba(255,255,255,0.1);
      padding: 3px 6px;
      border-radius: 6px;
      margin-right: 4px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      align-items: center;
    }

    .btn {
      border: none;
      padding: 6px 10px;
      border-radius: 8px;
      background: linear-gradient(90deg,#38bdf8,#a855f7);
      color: white;
      cursor: pointer;
    }

    #uploadBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      font-size: 20px;
      display: none;
    }

    #uploadBox {
      display: none;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 260px;
      background: #020617;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .file-btn {
      display: block;
      margin-top: 8px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      text-align: center;
      cursor: pointer;
    }

    .file-btn:hover {
      background: rgba(255,255,255,0.15);
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #000;
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="logo">Felix Mods</div>
  <div id="userInfo"></div>
</div>

<div class="search">
  <input placeholder="Search..." oninput="searchMods(this.value)">
</div>

<div id="mods" class="mods"></div>

<button id="uploadBtn" class="btn" onclick="toggleUpload()">+</button>

<div id="uploadBox">
  <input id="title" placeholder="Title">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="tags" placeholder="tag1, tag2 (max 8)">

  <label class="file-btn">
    📦 Pilih File Mod
    <input type="file" id="file" hidden>
  </label>
  <span id="fileName"></span>

  <label class="file-btn">
    🖼️ Thumbnail (opsional)
    <input type="file" id="thumb" hidden>
  </label>
  <span id="thumbName"></span>

  <button class="btn" onclick="uploadMod()">Upload</button>
  <p id="msg"></p>
</div>

<script>
const client = window.supabase.createClient(
  "https://eaizqmlycblctjmwootw.supabase.co",
  "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
);

let allMods = [];

// file name preview
file.onchange = e => fileName.innerText = e.target.files[0]?.name || "";
thumb.onchange = e => thumbName.innerText = e.target.files[0]?.name || "";

// role
async function checkRole() {
  const { data: { user } } = await client.auth.getUser();
  if (!user) location.href = "login.html";

  userInfo.innerText = user.email;

  const { data } = await client.from("profiles").select("*").eq("id", user.id).maybeSingle();
  if (data?.role === "modder") uploadBtn.style.display = "block";
}

// load mods
async function loadMods() {
  const { data } = await client.from("mods").select("*").order("created_at", { ascending: false });
  allMods = data;
  renderMods(data);
}

// render
async function renderMods(data) {
  mods.innerHTML = "";

  for (const mod of data) {

    const { data: ratings } = await client.from("ratings").select("rating").eq("mod_id", mod.id);
    let avg = ratings.length ? (ratings.reduce((a,b)=>a+b.rating,0)/ratings.length).toFixed(1) : 0;

    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      ${mod.thumbnail_url ? `<img class="thumb" src="${mod.thumbnail_url}">` : ""}

      <div class="title">${mod.title}</div>
      <div class="desc">${mod.description || ""}</div>

      ${(mod.tags || []).map(t=>`<span class="tag">#${t}</span>`).join("")}

      <div class="footer">
        <span>⭐ ${avg}</span>
        <div>
          <button class="btn" onclick="rate('${mod.id}',5)">⭐</button>
          <a href="${mod.file_url}" target="_blank">
            <button class="btn">Download</button>
          </a>
        </div>
      </div>
    `;

    mods.appendChild(el);
  }
}

// rating
async function rate(modId, value) {
  const { data: { user } } = await client.auth.getUser();
  await client.from("ratings").upsert({
    user_id: user.id,
    mod_id: modId,
    rating: value
  });
  alert("Rating masuk!");
}

// search
function searchMods(q) {
  q = q.toLowerCase();
  renderMods(allMods.filter(m => m.title.toLowerCase().includes(q)));
}

// toggle
function toggleUpload() {
  uploadBox.style.display = uploadBox.style.display === "none" ? "block" : "none";
}

// upload
async function uploadMod() {
  const msg = document.getElementById("msg");

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("file").files[0];
  const thumb = document.getElementById("thumb").files[0];
  const tags = document.getElementById("tags").value.split(",").map(t=>t.trim()).slice(0,8);

  if (!title || !file) return msg.innerText = "Isi title & file";

  const { data: { user } } = await client.auth.getUser();
  if (!user) return msg.innerText = "Belum login";

  // upload file mod
  const filePath = `mods/${user.id}/${Date.now()}_${file.name}`;
  const { error: err1 } = await client.storage.from("mods").upload(filePath, file);

  if (err1) {
    msg.innerText = err1.message;
    console.log(err1);
    return;
  }

  const { data: fileUrl } = client.storage.from("mods").getPublicUrl(filePath);

  // upload thumbnail
  let thumbUrl = null;
  if (thumb) {
    const tPath = `thumbs/${user.id}/${Date.now()}_${thumb.name}`;
    const { error: err2 } = await client.storage.from("mods").upload(tPath, thumb);

    if (!err2) {
      const { data } = client.storage.from("mods").getPublicUrl(tPath);
      thumbUrl = data.publicUrl;
    }
  }

  // insert DB
  const { error: dbErr } = await client.from("mods").insert({
    title,
    description: desc,
    file_url: fileUrl.publicUrl,
    thumbnail_url: thumbUrl,
    tags,
    author_id: user.id
  });

  if (dbErr) {
    msg.innerText = dbErr.message;
    console.log(dbErr);
    return;
  }

  msg.innerText = "Upload sukses!";
  loadMods();
}

// init
(async () => {
  await checkRole();
  await loadMods();
})();
</script>

</body>
  </html>
