<!DOCTYPE html>
<html>
<head>
  <title>Felix Mods - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Load sekali -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .mods {
      display: grid;
      gap: 15px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .title { font-weight: bold; font-size: 18px; }
    .desc { color: #94a3b8; margin-top: 5px; }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .btn {
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      background: linear-gradient(90deg,#38bdf8,#a855f7);
      color: white;
      cursor: pointer;
    }

    #uploadBox {
      display: none;
      margin-top: 15px;
    }

    input, textarea {
      width: 100%;
      margin: 6px 0;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #000;
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>Mods</h1>
  <button id="uploadBtn" class="btn" style="display:none;" onclick="toggleUpload()">Upload</button>
</div>

<div id="uploadBox">
  <input id="title" placeholder="Judul mod">
  <textarea id="desc" placeholder="Deskripsi"></textarea>
  <input type="file" id="file">
  <button class="btn" onclick="uploadMod()">Upload</button>
  <p id="msg"></p>
</div>

<div id="mods" class="mods"></div>

<script>
// 🔥 ERROR LOGGER
window.onerror = (e) => console.log("JS ERROR:", e);

// 🔑 INIT CLIENT (AMAN)
const client = window.supabase.createClient(
  "https://eaizqmlycblctjmwootw.supabase.co",
  "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
);

// 🔹 TOGGLE UPLOAD
function toggleUpload() {
  const box = document.getElementById("uploadBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// 🔹 CHECK ROLE
async function checkRole() {
  const { data: { user } } = await client.auth.getUser();

  console.log("USER:", user);

  if (!user) {
    location.href = "login.html";
    return;
  }

  const { data, error } = await client
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  console.log("PROFILE:", data);
  console.log("ERROR:", error);

  if (data && data.role && data.role.toLowerCase() === "modder") {
    document.getElementById("uploadBtn").style.display = "block";
    console.log("✅ MODDER");
  }
}

// 🔹 LOAD MODS
async function loadMods() {
  const { data, error } = await client
    .from("mods")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log("LOAD ERROR:", error);
    return;
  }

  const container = document.getElementById("mods");
  container.innerHTML = "";

  data.forEach(mod => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div class="title">${mod.title}</div>
      <div class="desc">${mod.description || ""}</div>

      <div class="footer">
        <span>${getType(mod.file_url)}</span>
        <a href="${mod.file_url}" target="_blank">
          <button class="btn">Download</button>
        </a>
      </div>
    `;

    container.appendChild(el);
  });
}

// 🔹 FILE TYPE
function getType(url) {
  if (!url) return "file";
  if (url.endsWith(".so")) return ".so";
  if (url.endsWith(".mcpack")) return ".mcpack";
  if (url.endsWith(".mcaddon")) return ".mcaddon";
  return "file";
}

// 🔥 UPLOAD
async function uploadMod() {
  const msg = document.getElementById("msg");

  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("file").files[0];

  if (!title || !file) {
    msg.innerText = "Isi title & pilih file";
    return;
  }

  const { data: { user } } = await client.auth.getUser();

  const filePath = `mods/${user.id}/${Date.now()}_${file.name}`;

  // upload storage
  const { error: uploadError } = await client.storage
    .from("mods")
    .upload(filePath, file);

  if (uploadError) {
    msg.innerText = uploadError.message;
    console.log(uploadError);
    return;
  }

  const { data } = client.storage
    .from("mods")
    .getPublicUrl(filePath);

  const fileUrl = data.publicUrl;

  // insert DB
  const { error: dbError } = await client.from("mods").insert({
    title: title,
    description: desc,
    file_url: fileUrl,
    author_id: user.id
  });

  if (dbError) {
    msg.innerText = dbError.message;
    console.log(dbError);
    return;
  }

  msg.innerText = "Upload sukses!";
  loadMods();
}

// 🚀 INIT
(async () => {
  await checkRole();
  await loadMods();
})();
</script>

</body>
  </html>
