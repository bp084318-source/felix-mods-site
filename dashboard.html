<!DOCTYPE html>
<html>
<head>
  <title>Felix Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Cropper FIX -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

  <style>
    body {
      margin:0;
      font-family:Segoe UI;
      background:#020617;
      color:white;
    }

    .topbar {
      display:flex;
      justify-content:space-between;
      padding:15px 20px;
      border-bottom:1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-weight:bold;
      background:linear-gradient(90deg,#38bdf8,#a855f7);
      -webkit-background-clip:text;
      color:transparent;
    }

    .mods {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:15px;
      padding:20px;
    }

    .card {
      background:rgba(255,255,255,0.05);
      padding:15px;
      border-radius:12px;
      transition:0.2s;
    }

    .card:hover {
      transform:translateY(-4px);
      box-shadow:0 0 15px rgba(56,189,248,0.2);
    }

    .thumb {
      width:100%;
      border-radius:10px;
      margin-bottom:8px;
    }

    .btn {
      border:none;
      padding:8px 12px;
      border-radius:8px;
      background:linear-gradient(90deg,#38bdf8,#a855f7);
      color:white;
      cursor:pointer;
    }

    .btn:hover { transform:scale(1.05); }

    #uploadBtn {
      position:fixed;
      bottom:20px;
      right:20px;
      width:55px;
      height:55px;
      border-radius:50%;
      display:none;
    }

    /* ✅ FIX MODAL CENTER */
    #editModal,#cropModal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      align-items:center;
      justify-content:center;
      z-index:999;
    }

    #editModal { background:rgba(0,0,0,0.7); }
    #cropModal { background:rgba(0,0,0,0.85); }

    #editModal > div {
      width:90%;
      max-width:350px;
      background:#020617;
      padding:20px;
      border-radius:12px;
      box-shadow:0 0 30px rgba(0,0,0,0.5);
      animation:pop 0.2s ease;
    }

    @keyframes pop {
      from {transform:scale(0.9) translateY(20px);opacity:0;}
      to {transform:scale(1);opacity:1;}
    }

    input, textarea {
      width:100%;
      margin-top:8px;
      padding:10px;
      border-radius:8px;
      border:1px solid rgba(255,255,255,0.1);
      background:#000;
      color:white;
    }

    textarea { height:70px; }
  </style>
</head>

<body>

<div class="topbar">
  <div class="logo">Felix Mods</div>
  <div id="userInfo"></div>
</div>

<div id="mods" class="mods"></div>
<button id="uploadBtn" class="btn">+</button>

<!-- EDIT -->
<div id="editModal">
  <div>
    <h3>Edit Profile</h3>

    <div id="avatarPicker" style="width:90px;height:90px;border-radius:50%;overflow:hidden;margin:auto;cursor:pointer">
      <img id="previewAvatar" style="width:100%;height:100%;object-fit:cover">
    </div>

    <input type="file" id="avatarInput" hidden>
    <input id="usernameInput" placeholder="Max 20 chars">
    <textarea id="bioInput" placeholder="Bio (optional)"></textarea>

    <button class="btn" onclick="saveProfile()">Save</button>
    <button class="btn" onclick="closeModal()">Cancel</button>

    <p id="msg"></p>
  </div>
</div>

<!-- CROP -->
<div id="cropModal">
  <div style="background:#020617;padding:10px;border-radius:10px">
    <img id="cropImage" style="max-width:300px">
    <br><br>
    <button class="btn" onclick="applyCrop()">Crop</button>
  </div>
</div>

<script>
(async () => {

  const client = window.supabase.createClient(
    "https://eaizqmlycblctjmwootw.supabase.co",
    "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
  );

  const userInfo = document.getElementById("userInfo");
  const modsDiv = document.getElementById("mods");
  const uploadBtn = document.getElementById("uploadBtn");

  const editModal = document.getElementById("editModal");
  const cropModal = document.getElementById("cropModal");

  const previewAvatar = document.getElementById("previewAvatar");
  const avatarInput = document.getElementById("avatarInput");
  const avatarPicker = document.getElementById("avatarPicker");
  const cropImage = document.getElementById("cropImage");

  const usernameInput = document.getElementById("usernameInput");
  const bioInput = document.getElementById("bioInput");
  const msg = document.getElementById("msg");

  let user, profile, selectedFile, cropper;

  const { data } = await client.auth.getSession();
  if (!data.session) return location.replace("/login.html");
  user = data.session.user;

  let { data: p } = await client.from("profiles")
    .select("*").eq("id",user.id).maybeSingle();

  profile = p;

  const avatar = profile?.avatar_url || `https://ui-avatars.com/api/?name=${user.email}`;

  userInfo.innerHTML = `
    <div onclick="openModal()" style="display:flex;align-items:center;gap:10px;cursor:pointer">
      <img src="${avatar}" style="width:35px;height:35px;border-radius:50%;object-fit:cover;">
      <div>
        <div>${profile?.username || user.email} ${profile?.role==="modder"?"✔":""}</div>
        <div style="font-size:11px;color:#94a3b8;">${profile?.bio || ""}</div>
      </div>
    </div>
  `;

  if (profile?.role==="modder") uploadBtn.style.display="block";

  const { data: mods } = await client.from("mods").select("*");

  mods?.forEach(mod=>{
    const el=document.createElement("div");
    el.className="card";
    el.innerHTML=`
      ${mod.thumbnail_url?`<img class="thumb" src="${mod.thumbnail_url}">`:""}
      <b>${mod.title}</b><br>
      <a href="${mod.file_url}" target="_blank">
        <button class="btn">Download</button>
      </a>
    `;
    modsDiv.appendChild(el);
  });

  window.openModal = ()=>{
    editModal.style.display="flex";
    previewAvatar.src=avatar;
    usernameInput.value=profile?.username||"";
    bioInput.value=profile?.bio||"";
  };

  window.closeModal = ()=> editModal.style.display="none";

  avatarPicker.onclick=()=>avatarInput.click();

  avatarInput.onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;

    const url=URL.createObjectURL(file);
    const img=new Image();
    img.src=url;

    img.onload=()=>{
      if(img.width===img.height){
        selectedFile=file;
        previewAvatar.src=url;
      }else{
        cropModal.style.display="flex";
        cropImage.src=url;

        cropImage.onload=()=>{
          if(cropper) cropper.destroy();
          cropper=new Cropper(cropImage,{aspectRatio:1});
        };
      }
    };
  };

  window.applyCrop=()=>{
    if(!cropper)return;

    const canvas=cropper.getCroppedCanvas({width:300,height:300});
    canvas.toBlob(blob=>{
      selectedFile=new File([blob],"avatar.png",{type:"image/png"});
      previewAvatar.src=URL.createObjectURL(blob);
      cropModal.style.display="none";
      cropper.destroy();
      cropper=null;
    });
  };

  window.saveProfile=async ()=>{
    let name=usernameInput.value.trim();
    let bio=bioInput.value.trim();

    if(name.length>20){
      msg.innerText="Max 20 chars!";
      return;
    }

    let avatarUrl=profile?.avatar_url;

    if(selectedFile){
      const path=`${user.id}/${Date.now()}_${selectedFile.name}`;
      await client.storage.from("avatars").upload(path,selectedFile,{upsert:true});
      const { data }=client.storage.from("avatars").getPublicUrl(path);
      avatarUrl=data.publicUrl;
    }

    await client.from("profiles").upsert({
      id:user.id,
      username:name,
      bio:bio,
      avatar_url:avatarUrl
    });

    location.reload();
  };

})();
</script>

</body>
</html>
