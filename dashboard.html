<!DOCTYPE html>
<html>
<head>
  <title>Felix Mods - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
      padding: 20px;
    }

    h1 { margin-bottom: 10px; }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .mods {
      display: grid;
      gap: 15px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .title { font-size: 18px; font-weight: bold; }
    .desc { color: #94a3b8; margin-top: 5px; }

    .footer {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .type {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      background: linear-gradient(90deg,#38bdf8,#a855f7);
      color: white;
      cursor: pointer;
    }

    #uploadBox {
      display: none;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
    }

    input, textarea {
      width: 100%;
      margin: 6px 0;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #000;
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <h1>Mods</h1>
  <button id="uploadBtn" class="btn" style="display:none;" onclick="toggleUpload()">Upload Mod</button>
</div>

<!-- UPLOAD FORM -->
<div id="uploadBox">
  <input id="title" placeholder="Judul mod">
  <textarea id="desc" placeholder="Deskripsi"></textarea>
  <input type="file" id="file">
  <button class="btn" onclick="uploadMod()">Upload</button>
  <p id="msg"></p>
</div>

<div id="mods" class="mods"></div>

<script>
const supabase = window.supabase.createClient(
  "https://eaizqmlycblctjmwootw.supabase.co",
  "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
);

// 🔹 Helper: type dari file
function getType(url) {
  if (!url) return "file";
  if (url.endsWith(".so")) return ".so";
  if (url.endsWith(".mcpack")) return ".mcpack";
  if (url.endsWith(".mcaddon")) return ".mcaddon";
  return "file";
}

// 🔹 Toggle upload
function toggleUpload() {
  const box = document.getElementById("uploadBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// 🔹 Load user & role
async function checkRole() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) {
    location.href = "login.html";
    return;
  }

  const { data } = await supabase
    .from("profiles")
    .select("role")
    .eq("id", user.id)
    .single();

  if (data?.role === "modder") {
    document.getElementById("uploadBtn").style.display = "block";
  }

  return user;
}

// 🔹 Load mods
async function loadMods() {
  const { data, error } = await supabase
    .from("mods")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const container = document.getElementById("mods");
  container.innerHTML = "";

  data.forEach(mod => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <div class="title">${mod.title}</div>
      <div class="desc">${mod.description || ""}</div>

      <div class="footer">
        <span class="type">${getType(mod.file_url)}</span>
        <a href="${mod.file_url}" target="_blank">
          <button class="btn">Download</button>
        </a>
      </div>
    `;

    container.appendChild(card);
  });
}
