<!DOCTYPE html>
<html>
<head>
  <title>Felix Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #020617;
      color: white;
    }

    /* HEADER */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(90deg,#38bdf8,#a855f7);
      -webkit-background-clip: text;
      color: transparent;
    }

    .user {
      font-size: 13px;
      color: #94a3b8;
    }

    /* SEARCH */
    .search {
      padding: 15px 20px;
    }

    .search input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #000;
      color: white;
    }

    /* GRID */
    .mods {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px,1fr));
      gap: 15px;
      padding: 20px;
    }

    /* CARD */
    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 15px;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(56,189,248,0.2);
    }

    .title {
      font-size: 17px;
      font-weight: bold;
    }

    .desc {
      font-size: 13px;
      color: #94a3b8;
      margin-top: 5px;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      margin-top: 12px;
      align-items: center;
    }

    .type {
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
    }

    .btn {
      padding: 6px 10px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(90deg,#38bdf8,#a855f7);
      color: white;
      cursor: pointer;
    }

    /* FLOAT UPLOAD */
    #uploadBtn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      font-size: 22px;
      display: none;
    }

    /* UPLOAD BOX */
    #uploadBox {
      display: none;
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 260px;
      background: #020617;
      padding: 15px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
      border-radius: 6px;
      border: none;
      background: #000;
      color: white;
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="logo">Felix Mods</div>
  <div class="user" id="userInfo">Loading...</div>
</div>

<div class="search">
  <input type="text" placeholder="Search mods..." oninput="searchMods(this.value)">
</div>

<div id="mods" class="mods"></div>

<!-- FLOAT BUTTON -->
<button id="uploadBtn" class="btn" onclick="toggleUpload()">+</button>

<!-- UPLOAD BOX -->
<div id="uploadBox">
  <input id="title" placeholder="Title">
  <textarea id="desc" placeholder="Description"></textarea>
  <input type="file" id="file">
  <button class="btn" onclick="uploadMod()">Upload</button>
  <p id="msg"></p>
</div>

<script>
const client = window.supabase.createClient(
  "https://eaizqmlycblctjmwootw.supabase.co",
  "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
);

let allMods = [];

// ROLE + USER
async function checkRole() {
  const { data: { user } } = await client.auth.getUser();

  if (!user) location.href = "login.html";

  document.getElementById("userInfo").innerText = user.email;

  const { data } = await client
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .maybeSingle();

  if (data?.role?.toLowerCase() === "modder") {
    document.getElementById("uploadBtn").style.display = "block";
  }
}

// LOAD MODS
async function loadMods() {
  const { data } = await client
    .from("mods")
    .select("*")
    .order("created_at", { ascending: false });

  allMods = data;
  renderMods(data);
}

// RENDER
function renderMods(data) {
  const container = document.getElementById("mods");
  container.innerHTML = "";

  data.forEach(mod => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div class="title">${mod.title}</div>
      <div class="desc">${mod.description || "No description"}</div>

      <div class="footer">
        <span class="type">${getType(mod.file_url)}</span>
        <a href="${mod.file_url}" target="_blank">
          <button class="btn">Download</button>
        </a>
      </div>
    `;

    container.appendChild(el);
  });
}

// SEARCH
function searchMods(q) {
  q = q.toLowerCase();
  const filtered = allMods.filter(m => 
    m.title.toLowerCase().includes(q)
  );
  renderMods(filtered);
}

// TYPE
function getType(url) {
  if (!url) return "file";
  if (url.endsWith(".so")) return ".so";
  if (url.endsWith(".mcpack")) return ".mcpack";
  if (url.endsWith(".mcaddon")) return ".mcaddon";
  return "file";
}

// TOGGLE
function toggleUpload() {
  const box = document.getElementById("uploadBox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

// UPLOAD
async function uploadMod() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;
  const file = document.getElementById("file").files[0];
  const msg = document.getElementById("msg");

  if (!title || !file) {
    msg.innerText = "Isi title & file";
    return;
  }

  const { data: { user } } = await client.auth.getUser();

  const path = `mods/${user.id}/${Date.now()}_${file.name}`;

  await client.storage.from("mods").upload(path, file);

  const { data } = client.storage.from("mods").getPublicUrl(path);

  await client.from("mods").insert({
    title,
    description: desc,
    file_url: data.publicUrl,
    author_id: user.id
  });

  msg.innerText = "Upload sukses!";
  loadMods();
}

// INIT
(async () => {
  await checkRole();
  await loadMods();
})();
</script>

</body>
  </html>
