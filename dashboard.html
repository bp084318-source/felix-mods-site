<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Felix Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0a1a3a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 400px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    h1 {
      background: linear-gradient(90deg, #4facfe, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(90deg, #4facfe, #a855f7);
      color: white;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Dashboard</h1>
  <p id="user-email">Loading...</p>

  <button onclick="goUpload()">Upload Mod</button>
  <button onclick="logout()">Logout</button>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://eaizqmlycblctjmwootw.supabase.co",
  "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
);

async function checkUser() {
  const { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    window.location.href = "login.html";
  } else {
    document.getElementById("user-email").innerText = "Login sebagai: " + user.email;
  }
}

function goUpload() {
  window.location.href = "upload.html";
}

async function logout() {
  await supabase.auth.signOut();
  window.location.href = "login.html";
}

checkUser();
</script>

</body>
</html>
