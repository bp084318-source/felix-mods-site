<!DOCTYPE html>
<html>
<head>
  <title>Login - Felix Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🔥 CDN FIX (lebih stabil) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      background: linear-gradient(90deg, #38bdf8, #a855f7);
      color: white;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Felix Mods Login</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>

  <p id="msg"></p>
</div>

<script>
console.log("🔥 SCRIPT LOADED");

// ❗ cek supabase ada atau gak
if (!window.supabase) {
  alert("Supabase gagal load!");
}

// 🔑 INIT
const supabase = window.supabase.createClient(
  "https://eaizqmlycblctjmwootw.supabase.co",
  "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
);

// 🔥 PROFILE
async function ensureProfile() {
  const { data: { user } } = await supabase.auth.getUser();
  console.log("USER:", user);

  if (!user) return;

  const { data } = await supabase
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .maybeSingle();

  if (data) return;

  const { error } = await supabase.from("profiles").insert({
    id: user.id,
    username: "user_" + user.id.slice(0,5)
  });

  console.log("INSERT PROFILE:", error || "SUCCESS");
}

// 🟢 REGISTER
async function register() {
  console.log("REGISTER CLICK");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  const { data, error } = await supabase.auth.signUp({
    email, password
  });

  console.log("REGISTER RESULT:", data, error);

  if (error) {
    msg.innerText = "❌ " + error.message;
    return;
  }

  if (!data.session) {
    msg.innerText = "⚠️ Email confirmation masih aktif!";
    return;
  }

  await ensureProfile();
  msg.innerText = "✅ Register sukses!";
}

// 🔵 LOGIN
async function login() {
  console.log("LOGIN CLICK");

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  const { data, error } = await supabase.auth.signInWithPassword({
    email, password
  });

  console.log("LOGIN RESULT:", data, error);

  if (error) {
    msg.innerText = "❌ " + error.message;
    return;
  }

  await ensureProfile();

  msg.innerText = "✅ Login sukses!";
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 800);
}
</script>

</body>
</html>
