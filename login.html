<!DOCTYPE html>
<html>
<head>
  <title>Login - Felix Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 30px;
      border-radius: 12px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 6px;
      border: none;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      background: linear-gradient(90deg, #38bdf8, #a855f7);
      color: white;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
      color: #94a3b8;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Felix Mods</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>

  <p id="msg"></p>
</div>

<script>
const supabase = window.supabase.createClient(
  "https://eaizqmlycblctjmwootw.supabase.co",
  "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
);

// 🔥 PROFILE
async function ensureProfile() {
  const { data: { user } } = await supabase.auth.getUser();
  if (!user) return;

  const { data } = await supabase
    .from("profiles")
    .select("id")
    .eq("id", user.id)
    .maybeSingle();

  if (data) return;

  const { error } = await supabase.from("profiles").insert({
    id: user.id,
    username: "user_" + user.id.slice(0,5),
    email: user.email // optional
  });

  if (error) {
    console.log("Profile error:", error.message);
  }
}

// 🟢 REGISTER
async function register() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "❌ Isi email dan password!";
    return;
  }

  msg.innerText = "⏳ Registering...";

  const { data, error } = await supabase.auth.signUp({
    email,
    password
  });

  if (error) {
    msg.innerText = "❌ " + error.message;
    return;
  }

  if (!data.session) {
    msg.innerText = "⚠️ Cek email untuk konfirmasi!";
    return;
  }

  await ensureProfile();
  msg.innerText = "✅ Register sukses!";
}

// 🔵 LOGIN
async function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "❌ Isi email dan password!";
    return;
  }

  msg.innerText = "⏳ Logging in...";

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    msg.innerText = "❌ " + error.message;
    return;
  }

  await ensureProfile();

  msg.innerText = "✅ Login sukses!";
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 800);
}
</script>

</body>
</html>
