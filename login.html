<!DOCTYPE html>
<html>
<head>
  <title>Felix Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
      background: #000;
      color: white;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
      background: linear-gradient(90deg,#38bdf8,#a855f7);
      color: white;
      cursor: pointer;
    }

    #msg {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Felix Mods</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>

  <p id="msg"></p>
</div>

<script>
window.onload = () => {

  const supabaseClient = window.supabase.createClient(
    "https://eaizqmlycblctjmwootw.supabase.co",
    "sb_publishable_VGpOfdcS2GCTsNa6TMkUYA_82yY_mSx"
  );

  // 🔥 AUTO PROFILE (dengan email)
  async function ensureProfile() {
    const { data: { user } } = await supabaseClient.auth.getUser();
    if (!user) return;

    const { data } = await supabaseClient
      .from("profiles")
      .select("id")
      .eq("id", user.id)
      .maybeSingle();

    if (data) return;

    await supabaseClient.from("profiles").insert({
      id: user.id,
      username: "user_" + user.id.slice(0,5),
      email: user.email
    });
  }

  // 🟢 REGISTER
  window.register = async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    if (!email || !password) {
      msg.innerText = "Isi email & password";
      return;
    }

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (error) {
      msg.innerText = error.message;
      return;
    }

    // kalau email confirm mati → langsung ada session
    if (data.session) {
      await ensureProfile();
    }

    msg.innerText = "Register sukses";
  };

  // 🔵 LOGIN
  window.login = async function() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const msg = document.getElementById("msg");

    const { error } = await supabaseClient.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      msg.innerText = error.message;
      return;
    }

    await ensureProfile();

    msg.innerText = "Login sukses";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 700);
  };

};
</script>

</body>
  </html>
