<!DOCTYPE html>
<html>
<head>
  <title>Felix Mods</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <div id="auth"></div>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      overflow-x: hidden;
    }

    /* glow background */
    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: #38bdf8;
      filter: blur(120px);
      opacity: 0.2;
      top: -100px;
      left: -100px;
    }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      background: linear-gradient(90deg, #38bdf8, #a855f7);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
      position: relative;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #94a3b8;
      max-width: 500px;
      margin: auto;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      border-radius: 10px;
      background: linear-gradient(90deg, #38bdf8, #a855f7);
      color: white;
      text-decoration: none;
      box-shadow: 0 0 20px rgba(56,189,248,0.5);
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(168,85,247,0.7);
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      margin: 10px;
      display: inline-block;
      width: 250px;
      backdrop-filter: blur(10px);
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #64748b;
    }
  </style>
</head>

<body>

<div class="glow"></div>

<header>
  <h1>Felix Mods</h1>
</header>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabase = window.supabase.createClient(
  "https://eaizqmlycblctjmwootw.supabase.co",
  "YOUR_PUBLIC_ANON_KEY"
);

async function checkUser() {
  const { data: { user } } = await supabase.auth.getUser();

  const authDiv = document.getElementById("auth");

  if (user) {
    authDiv.innerHTML = `
      <a class="btn" href="/dashboard.html">Dashboard</a>
    `;
  } else {
    authDiv.innerHTML = `
      <a class="btn" href="/login.html">Login</a>
    `;
  }
}

checkUser();
</script>
<section class="hero">
  <h2>Native Minecraft Mods Platform</h2>
  <p>Upload, share, and explore powerful native (.so) mods for Minecraft Android.</p>

  <a class="btn" href="https://mods.felix-mods.my.id">
    Explore Mods
  </a>
</section>


<section class="section">
  <h2>Features</h2>

  <div class="card">
    <h3>⚡ Fast Mods</h3>
    <p>Native mods with high performance.</p>
  </div>

  <div class="card">
    <h3>📦 Upload</h3>
    <p>Upload your own mods easily.</p>
  </div>

  <div class="card">
    <h3>👤 Profile</h3>
    <p>Showcase your work as a modder.</p>
  </div>

</section>

<footer>
  © 2026 Felix Mods
</footer>

</body>
</html>
